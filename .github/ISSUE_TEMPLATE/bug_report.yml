name: Bug report
description: Report a CLI, package, or documentation bug
title: "[bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands and sanitized output.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CLI version
      placeholder: yb --version
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I did not include API keys, tokens, recovery codes, cookies, or private video data.
          required: true
