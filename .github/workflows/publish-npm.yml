name: Publish npm package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'
      - name: Use npm 11 for trusted publishing
        run: npm install -g npm@11.11.0
      - name: Show tool versions
        run: |
          node --version
          npm --version
      - name: Resolve release channel
        id: release
        run: |
          package_version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          publish_tag="latest"
          if [[ "$package_version" == *-* ]]; then
            publish_tag="beta"
          fi
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
          echo "publish_tag=$publish_tag" >> "$GITHUB_OUTPUT"
      - name: Check tag matches package version
        if: github.ref_type == 'tag'
        run: |
          package_tag="v${{ steps.release.outputs.package_version }}"
          if [ "${GITHUB_REF_NAME}" != "${package_tag}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${package_tag}" >&2
            exit 1
          fi

      - name: Verify package
        run: npm run verify
      - name: Run release gate
        run: npm run release:gate
      - name: Smoke packed artifact
        run: npm run smoke:pack
      - name: Publish to npm
        run: npm publish --access public --tag "${{ steps.release.outputs.publish_tag }}" --provenance
