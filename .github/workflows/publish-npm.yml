name: Publish npm beta

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'
      - name: Show tool versions
        run: |
          node --version
          npm --version
      - name: Check tag matches package version
        if: github.ref_type == 'tag'
        run: |
          package_version="v$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          if [ "${GITHUB_REF_NAME}" != "${package_version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${package_version}" >&2
            exit 1
          fi

      - name: Verify package
        run: npm run verify
      - name: Run release gate
        run: npm run release:gate
      - name: Smoke packed artifact
        run: npm run smoke:pack
      - name: Publish to npm beta
        run: npm publish --access public --tag beta --provenance
